name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare archive
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/kmpolice dist/kmpolice
          tar -C dist -czf kmpolice-${{ matrix.target }}.tar.gz kmpolice
          shasum -a 256 kmpolice-${{ matrix.target }}.tar.gz > kmpolice-${{ matrix.target }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kmpolice-${{ matrix.target }}
          path: |
            kmpolice-${{ matrix.target }}.tar.gz
            kmpolice-${{ matrix.target }}.tar.gz.sha256

  build-linux:
    runs-on: ubuntu-24.04
    container: debian:12

    steps:
      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates curl build-essential git binutils

      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Prepare archive
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/kmpolice dist/kmpolice
          tar -C dist -czf kmpolice-x86_64-unknown-linux-gnu.tar.gz kmpolice
          sha256sum kmpolice-x86_64-unknown-linux-gnu.tar.gz > kmpolice-x86_64-unknown-linux-gnu.tar.gz.sha256

          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            VERSION="$(grep '^version = ' Cargo.toml | head -n1 | cut -d'\"' -f2)"
          fi
          ./scripts/build-deb.sh target/x86_64-unknown-linux-gnu/release/kmpolice "$VERSION" amd64 dist
          sha256sum dist/kmpolice_${VERSION}_amd64.deb > dist/kmpolice_${VERSION}_amd64.deb.sha256

      - name: Check glibc requirement
        run: |
          readelf --version-info target/x86_64-unknown-linux-gnu/release/kmpolice | grep 'GLIBC_' | sort -Vu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kmpolice-x86_64-unknown-linux-gnu
          path: |
            kmpolice-x86_64-unknown-linux-gnu.tar.gz
            kmpolice-x86_64-unknown-linux-gnu.tar.gz.sha256
            dist/*.deb
            dist/*.deb.sha256

  publish:
    needs:
      - build-macos
      - build-linux
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten assets
        run: |
          mkdir -p out
          find release-assets -type f -name "*.tar.gz" -exec cp {} out/ \;
          find release-assets -type f -name "*.sha256" -exec cp {} out/ \;
          find release-assets -type f -name "*.deb" -exec cp {} out/ \;
          ls -la out

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          generate_release_notes: true
